<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>PhotoCleanup — review</title>
<style>
  body { font-family:system-ui,sans-serif; margin:0; background:#111; color:#eee; }
  header { padding:14px 24px; background:#1a1a1a; position:sticky; top:0; z-index:10;
           display:flex; justify-content:space-between; align-items:center; }
  h1 { margin:0; font-size:17px; }
  header .right { display:flex; gap:14px; align-items:center; }
  header a { color:#888; font-size:13px; text-decoration:none; }
  #approve { background:#3ba55d; color:#fff; border:0; border-radius:8px; padding:9px 18px;
             font-size:14px; cursor:pointer; }
  .keepctl { display:flex; align-items:center; gap:10px; font-size:13px; color:#bbb; }
  .keepctl input[type=number] { width:54px; background:#1a1a1a; color:#eee; border:1px solid #333;
                                border-radius:6px; padding:5px; font-size:13px; text-align:center; }
  .banner { margin:14px 24px 0; padding:10px 14px; background:#2a2410; border:1px solid #4a3f18;
            border-radius:8px; color:#e8c96a; font-size:13px; }
  .section { padding:14px 24px; border-bottom:1px solid #222; }
  .sechead { display:flex; align-items:baseline; gap:10px; cursor:pointer; margin:0 0 12px;
             font-size:14px; font-weight:600; user-select:none; }
  .sechead .cnt { color:#666; font-weight:400; font-size:12px; }
  .sechead.keep span:first-child { color:#3ba55d; }
  .sechead.maybe span:first-child { color:#d6a23a; }
  .grid { display:flex; flex-wrap:wrap; gap:12px; align-items:flex-start; }
  .card { width:190px; position:relative; border-radius:8px; overflow:hidden; cursor:pointer;
          border:3px solid transparent; background:#1a1a1a; transition:transform .12s; }
  .card:hover { transform:scale(1.07); z-index:5; }
  .card img { width:190px; height:190px; object-fit:cover; display:block; }
  .card.keep { border-color:#3ba55d; }
  .card.maybe { border-color:#d6a23a; }
  .card.delete { opacity:.5; }
  .card.delete:hover { opacity:1; }
  .meta { font-size:11px; padding:4px 7px; display:flex; justify-content:space-between; color:#bbb; }
  .badge { position:absolute; top:6px; left:6px; font-size:10px; padding:2px 8px; border-radius:10px;
           background:#3ba55d; color:#fff; text-transform:uppercase; letter-spacing:.04em; }
  .maybe .badge { background:#d6a23a; }
  .delete .badge { background:#666; }
  .why { position:absolute; top:28px; left:6px; right:6px; padding:3px 6px; font-size:10px;
         border-radius:4px; background:rgba(0,0,0,.72); opacity:0; transition:opacity .12s; }
  .card:hover .why { opacity:1; }
  .acts { position:absolute; bottom:25px; left:0; right:0; display:flex; opacity:0; transition:opacity .12s; }
  .card:hover .acts { opacity:1; }
  .acts button { flex:1; border:0; padding:7px 0; font-size:11px; font-weight:600; cursor:pointer; color:#fff; }
  .acts .del { background:rgba(210,60,60,.94); }
  .acts .keep { background:rgba(59,165,93,.94); }
  #cmp { display:none; position:fixed; inset:0; background:rgba(0,0,0,.96); z-index:100; flex-direction:column; }
  #cmp .hero { flex:1; display:flex; align-items:center; justify-content:center; position:relative; min-height:0; }
  #cmp .hero img { max-width:86vw; max-height:68vh; }
  #cmp .arrow { position:absolute; top:50%; transform:translateY(-50%); font-size:44px; color:#fff;
                background:none; border:0; cursor:pointer; padding:0 26px; opacity:.65; }
  #cmp .arrow:hover { opacity:1; }
  #cmp .arrow.left { left:0; } #cmp .arrow.right { right:0; }
  #cmp .bar { padding:10px 18px; font-size:13px; color:#ccc; display:flex; justify-content:space-between;
              align-items:center; }
  #cmp .cmp-acts button { border:0; border-radius:6px; padding:8px 18px; font-size:13px; cursor:pointer;
                          margin-left:8px; color:#fff; opacity:.5; }
  #cmp .cmp-acts .del { background:#c83c3c; }
  #cmp .cmp-acts .keep { background:#3ba55d; }
  #cmp .cmp-acts button.active { opacity:1; outline:2px solid #fff; }
  #cmp .strip { display:flex; gap:8px; padding:12px; overflow-x:auto; background:#141414; }
  #cmp .strip img { height:78px; border-radius:4px; cursor:pointer; border:2px solid transparent; opacity:.55; }
  #cmp .strip img.active { border-color:#3ba55d; opacity:1; }
  #cmp .close { position:absolute; top:14px; right:20px; font-size:22px; color:#fff; cursor:pointer; z-index:2; }
  .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:200;
           align-items:center; justify-content:center; }
  .modal-box { background:#1c1c1c; border:1px solid #333; border-radius:12px; padding:24px; max-width:440px; }
  .modal-box p { margin:0 0 18px; line-height:1.5; font-size:14px; }
  .modal-btns { display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }
  .modal-btns button { border:0; border-radius:8px; padding:9px 16px; font-size:13px; cursor:pointer; }
  .modal-btns .ghost { background:#333; color:#eee; }
  .modal-btns .primary { background:#3ba55d; color:#fff; }
  .modal-btns .warnbtn { background:#d6a23a; color:#111; }
  .banner .bannerbtn { margin-left:10px; background:#d6a23a; color:#111; border:0; border-radius:6px;
                       padding:5px 12px; font-size:12px; cursor:pointer; }
  #swipe { display:none; position:fixed; inset:0; background:#0c0c0c; z-index:150; flex-direction:column; }
  #swipe .sw-top { display:flex; justify-content:space-between; padding:12px 20px; color:#aaa; font-size:13px; }
  #swipe .sw-close { cursor:pointer; }
  #swipe .sw-stage { flex:1; display:flex; align-items:center; justify-content:center; position:relative; min-height:0; }
  #swipe .sw-stage img { max-width:78vw; max-height:70vh; border-radius:8px; touch-action:none;
                         cursor:grab; user-select:none; }
  #swipe .sw-hint { position:absolute; top:50%; transform:translateY(-50%); font-size:18px; font-weight:700;
                    padding:8px 14px; border-radius:8px; opacity:.22; pointer-events:none; }
  #swipe .sw-hint.left { left:5vw; color:#e0506a; }
  #swipe .sw-hint.right { right:5vw; color:#3ba55d; }
  #swipe .sw-controls { display:flex; align-items:center; justify-content:center; gap:22px; padding:18px; }
  #swipe .sw-controls #sw-name { color:#888; font-size:13px; min-width:200px; text-align:center; }
  #swipe .sw-controls button { border:0; border-radius:10px; padding:12px 26px; font-size:15px; cursor:pointer; color:#fff; }
  #swipe .sw-controls .del { background:#c83c3c; }
  #swipe .sw-controls .keep { background:#3ba55d; }
</style>
</head>
<body>
<header>
  <h1>Photo Cleanup — results</h1>
  <div class="keepctl">
    <label>Keep</label>
    <input type="number" id="keep-num" min="1" placeholder="N">
    <label>photos — type a number, Enter to re-rank</label>
  </div>
  <div class="right"><button id="approve">Approve &amp; export</button><a href="/">↻ new batch</a></div>
</header>
<div id="app">Loading…</div>

<div id="cmp">
  <span class="close" onclick="closeCmp()">✕</span>
  <div class="hero">
    <button class="arrow left" onclick="step(-1)">‹</button>
    <img id="hero-img">
    <button class="arrow right" onclick="step(1)">›</button>
  </div>
  <div class="bar">
    <span><span id="cmp-name"></span> &nbsp; <span id="cmp-why" style="color:#888"></span></span>
    <span class="cmp-acts">
      <button class="del" onclick="cmpSet('delete')">✕ Delete</button>
      <button class="keep" onclick="cmpSet('keep')">✓ Keep</button>
    </span>
  </div>
  <div class="strip" id="strip"></div>
</div>

<div id="swipe">
  <div class="sw-top"><span id="sw-progress"></span><span class="sw-close" onclick="endSwipe()">✕ close</span></div>
  <div class="sw-stage">
    <div class="sw-hint left">✕ delete</div>
    <img id="sw-img" draggable="false">
    <div class="sw-hint right">keep ✓</div>
  </div>
  <div class="sw-controls">
    <button class="del" onclick="swipeDecide('delete')">✕ Delete (←)</button>
    <span id="sw-name"></span>
    <button class="keep" onclick="swipeDecide('keep')">Keep (→) ✓</button>
  </div>
</div>

<div id="warn" class="modal">
  <div class="modal-box">
    <p id="warn-text"></p>
    <div class="modal-btns">
      <button class="ghost" onclick="reviewMaybes()">Review them</button>
      <button class="warnbtn" onclick="continueAnyway()">Continue anyway</button>
    </div>
  </div>
</div>

<div id="choice" class="modal">
  <div class="modal-box">
    <p>How should I finish? Your delete photos are <b>moved, never erased</b> — recoverable either way.</p>
    <div class="modal-btns">
      <button class="ghost" onclick="execute('export')">Keep folder unchanged — download a copy</button>
      <button class="primary" onclick="execute('in_place')">Clean folder in place</button>
    </div>
  </div>
</div>

<div id="done" class="modal">
  <div class="modal-box">
    <p id="done-text"></p>
    <div class="modal-btns"><button class="primary" onclick="location.href='/'">Done</button></div>
  </div>
</div>

<script>
const enc = encodeURIComponent;
let DATA = null;
let compare = { photos: [], idx: 0 };
const open = { keep: true, delete: false, maybe: true };
const show = id => document.getElementById(id).style.display = 'flex';
const hide = id => document.getElementById(id).style.display = 'none';

async function load() {
  DATA = await (await fetch('/api/clusters')).json();
  for (const c of DATA.clusters) for (const p of c.photos) p._cluster = c.photos;  // remember burst
  if (DATA.mode === 'folder') document.getElementById('approve').textContent = 'Approve';
  render();
  initKeepControl();
}

function allPhotos() {
  const all = [];
  for (const c of DATA.clusters) all.push(...c.photos);
  return all;
}

function allocateKeeps(sizes, totalKeep) {
  if (!sizes.length) return [];
  const grand = sizes.reduce((a, b) => a + b, 0);
  return sizes.map(s => Math.min(s, Math.max(1, Math.round(totalKeep * s / grand))));
}
function reallocate(n) {
  const multi = DATA.clusters.filter(c => c.size > 1);
  const keeps = allocateKeeps(multi.map(c => c.size), n);
  multi.forEach((c, i) => c.photos.forEach((p, j) => {
    p.recommendation = j < keeps[i] ? 'keep' : 'delete';
  }));
  render();
}
function initKeepControl() {
  const multiTotal = DATA.clusters.filter(c => c.size > 1).reduce((s, c) => s + c.size, 0);
  const ctl = document.querySelector('.keepctl');
  if (multiTotal === 0) { ctl.style.display = 'none'; return; }
  const num = document.getElementById('keep-num');
  num.max = multiTotal;
  num.value = allPhotos().filter(p => p.recommendation === 'keep').length || 1;
  num.onchange = () => {
    const v = Number(num.value);
    if (v >= 1) { num.value = Math.min(v, multiTotal); reallocate(Number(num.value)); }
  };
}

function render() {
  const all = allPhotos();
  const app = document.getElementById('app');
  app.innerHTML = '';
  const maybes = all.filter(p => p.recommendation === 'maybe').length;
  if (maybes > 0) {
    const b = document.createElement('div');
    b.className = 'banner';
    b.innerHTML = `<b>Warning:</b> ${maybes} photo(s) are in <b>Maybe</b> — review each and set it to Keep or Delete. ` +
                  `Anything left in Maybe becomes a delete candidate when you click Approve.`;
    const btn = document.createElement('button');
    btn.className = 'bannerbtn';
    btn.textContent = 'Review one-by-one →';
    btn.onclick = () => startSwipe(allPhotos().filter(p => p.recommendation === 'maybe'));
    b.appendChild(btn);
    app.appendChild(b);
  }
  app.appendChild(section('Keep', 'keep', all.filter(p => p.recommendation === 'keep')));
  app.appendChild(section('Delete', 'delete', all.filter(p => p.recommendation === 'delete')));
  app.appendChild(section('Maybe', 'maybe', all.filter(p => p.recommendation === 'maybe')));
}

function section(title, key, photos) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.id = 'sec-' + key;
  const head = document.createElement('div');
  head.className = 'sechead ' + key;
  head.innerHTML = `<span>${open[key] ? '▾' : '▸'} ${title}</span><span class="cnt">${photos.length}</span>`;
  head.onclick = () => { open[key] = !open[key]; render(); };
  sec.appendChild(head);
  if (open[key] && photos.length) {
    const grid = document.createElement('div');
    grid.className = 'grid';
    photos.forEach(p => grid.appendChild(card(p)));
    sec.appendChild(grid);
  }
  return sec;
}

function setRec(photo, rec) { photo.recommendation = rec; render(); }

function card(photo) {
  const div = document.createElement('div');
  div.className = 'card ' + photo.recommendation;
  const why = (photo.reasons || []).join(' · ');
  div.innerHTML = `
    <span class="badge">${photo.recommendation}</span>
    <img src="/thumb/${enc(photo.name)}" loading="lazy">
    ${why ? `<div class="why">${why}</div>` : ''}
    <div class="acts"><button class="del">✕ Delete</button><button class="keep">✓ Keep</button></div>
    <div class="meta"><span>${photo.name}</span></div>`;
  div.querySelector('.acts .del').onclick = (e) => { e.stopPropagation(); setRec(photo, 'delete'); };
  div.querySelector('.acts .keep').onclick = (e) => { e.stopPropagation(); setRec(photo, 'keep'); };
  div.onclick = () => openCmp(photo._cluster, photo);
  return div;
}

function openCmp(photos, photo) {
  compare = { photos, idx: Math.max(0, photos.indexOf(photo)) };
  renderCmp();
  show('cmp');
}
function renderCmp() {
  const p = compare.photos[compare.idx];
  document.getElementById('hero-img').src = '/photo/' + enc(p.name);
  document.getElementById('cmp-name').textContent = `${p.name} · ${p.recommendation}`;
  document.getElementById('cmp-why').textContent = (p.reasons || []).join(' · ');
  document.querySelector('.cmp-acts .del').classList.toggle('active', p.recommendation === 'delete');
  document.querySelector('.cmp-acts .keep').classList.toggle('active', p.recommendation === 'keep');
  const strip = document.getElementById('strip');
  strip.innerHTML = '';
  compare.photos.forEach((q, i) => {
    const t = document.createElement('img');
    t.src = '/thumb/' + enc(q.name);
    if (i === compare.idx) t.className = 'active';
    t.onclick = () => { compare.idx = i; renderCmp(); };
    strip.appendChild(t);
  });
}
function cmpSet(rec) { compare.photos[compare.idx].recommendation = rec; renderCmp(); }
function step(d) {
  compare.idx = (compare.idx + d + compare.photos.length) % compare.photos.length;
  renderCmp();
}
function closeCmp() { hide('cmp'); render(); }

// --- Swipe review: full-screen, one photo at a time (← delete, → keep) ---
let swipe = { photos: [], idx: 0 };
function startSwipe(photos) {
  if (!photos.length) return;
  swipe = { photos, idx: 0 };
  renderSwipe();
  show('swipe');
}
function renderSwipe() {
  if (swipe.idx >= swipe.photos.length) { endSwipe(); return; }
  const p = swipe.photos[swipe.idx];
  const img = document.getElementById('sw-img');
  img.style.transition = 'none';
  img.style.transform = 'none';
  img.style.opacity = '1';
  img.src = '/photo/' + enc(p.name);
  document.getElementById('sw-name').textContent = p.name;
  document.getElementById('sw-progress').textContent = `${swipe.idx + 1} / ${swipe.photos.length}`;
}
function swipeDecide(rec) {
  swipe.photos[swipe.idx].recommendation = rec;
  swipe.idx++;
  renderSwipe();
}
function endSwipe() { hide('swipe'); render(); }

(function () {
  const img = document.getElementById('sw-img');
  let startX = 0, dragging = false;
  img.addEventListener('pointerdown', e => {
    dragging = true; startX = e.clientX; img.setPointerCapture(e.pointerId); img.style.transition = 'none';
  });
  img.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    img.style.transform = `translateX(${dx}px) rotate(${dx / 40}deg)`;
    img.style.opacity = String(1 - Math.min(Math.abs(dx) / 500, 0.4));
  });
  const endDrag = e => {
    if (!dragging) return;
    dragging = false;
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 110) swipeDecide(dx > 0 ? 'keep' : 'delete');
    else { img.style.transition = 'transform .12s'; img.style.transform = 'none'; img.style.opacity = '1'; }
  };
  img.addEventListener('pointerup', endDrag);
  img.addEventListener('pointercancel', endDrag);
})();

document.addEventListener('keydown', e => {
  if (document.getElementById('swipe').style.display === 'flex') {
    if (e.key === 'ArrowRight') swipeDecide('keep');
    else if (e.key === 'ArrowLeft') swipeDecide('delete');
    else if (e.key === 'Escape') endSwipe();
    return;
  }
  if (document.getElementById('cmp').style.display !== 'flex') return;
  if (e.key === 'ArrowLeft') step(-1);
  else if (e.key === 'ArrowRight') step(1);
  else if (e.key === 'Escape') closeCmp();
});

// --- Approve ---
document.getElementById('approve').onclick = () => {
  const maybes = allPhotos().filter(p => p.recommendation === 'maybe').length;
  if (maybes > 0) {
    document.getElementById('warn-text').textContent =
      `${maybes} photo(s) are still in "Maybe". If you continue, they'll be moved to ` +
      `delete_candidates (recoverable — nothing is erased). Review them first?`;
    show('warn');
  } else {
    afterMaybes();
  }
};
function reviewMaybes() {
  hide('warn');
  open.maybe = true;
  render();
  document.getElementById('sec-maybe').scrollIntoView({ behavior: 'smooth' });
}
function continueAnyway() { hide('warn'); afterMaybes(); }
function afterMaybes() {
  if (DATA.mode === 'folder') show('choice');
  else execute('export');
}
async function execute(action) {
  hide('choice');
  const decisions = {};
  allPhotos().forEach(p => decisions[p.name] = p.recommendation === 'keep' ? 'keep' : 'delete');
  const res = await fetch('/api/approve', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ decisions, action }),
  });
  if (action === 'in_place') {
    const r = await res.json();
    document.getElementById('done-text').textContent =
      `✓ Moved ${r.moved} photos to delete_candidates/. Your folder now holds only the keeps — ` +
      `trash that folder whenever you're ready.`;
    show('done');
  } else {
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'photocleanup_result.zip';
    a.click();
    URL.revokeObjectURL(a.href);
  }
}

load();
</script>
</body>
</html>
