<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>PhotoCleanup</title>
<style>
  body { font-family:system-ui,sans-serif; margin:0; min-height:100vh; background:#111; color:#eee;
         display:flex; align-items:center; justify-content:center; }
  .panel { width:480px; max-width:90vw; text-align:center; }
  h1 { font-size:22px; margin-bottom:4px; }
  p.sub { color:#999; margin-top:0; font-size:14px; }
  #drop { border:2px dashed #444; border-radius:12px; padding:44px 20px; margin:24px 0;
          cursor:pointer; transition:border-color .15s, background .15s; }
  #drop.over { border-color:#3ba55d; background:#16201a; }
  #count { color:#3ba55d; font-size:13px; min-height:18px; margin-top:8px; }
  .row { display:flex; align-items:center; justify-content:center; gap:8px; margin:16px 0; font-size:14px; }
  input[type=number] { width:64px; background:#1a1a1a; color:#eee; border:1px solid #333;
                       border-radius:6px; padding:6px; font-size:14px; text-align:center; }
  button { background:#3ba55d; color:#fff; border:0; border-radius:8px; padding:12px 30px;
           font-size:15px; cursor:pointer; }
  button:disabled { background:#333; color:#777; cursor:default; }
  #status { margin-top:18px; color:#999; font-size:13px; min-height:18px; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid #555;
             border-top-color:#3ba55d; border-radius:50%; animation:spin 1s linear infinite;
             vertical-align:-2px; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="panel">
  <h1>PhotoCleanup</h1>
  <p class="sub">Drop your photos. I'll group the near-duplicates and recommend which to keep.</p>
  <div id="drop">
    <div>Drag photos here, or click to choose</div>
    <div id="count"></div>
  </div>
  <input type="file" id="file" multiple accept="image/*,.heic,.heif" hidden>
  <div class="row">
    <label>Keep about</label>
    <input type="number" id="keep" value="4" min="1">
    <label>photos total</label>
  </div>
  <button id="go" disabled>Analyze</button>
  <div id="status"></div>
</div>
<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const go = document.getElementById('go');
let files = [];

function setFiles(list) {
  files = [...list].filter(f => f.type.startsWith('image/') || /\.(heic|heif)$/i.test(f.name));
  document.getElementById('count').textContent = files.length ? `${files.length} photos selected` : '';
  go.disabled = files.length === 0;
}

drop.onclick = () => fileInput.click();
fileInput.onchange = () => setFiles(fileInput.files);
drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = e => { e.preventDefault(); drop.classList.remove('over'); setFiles(e.dataTransfer.files); };

go.onclick = async () => {
  go.disabled = true;
  document.getElementById('status').innerHTML =
    `<span class="spinner"></span>Analyzing ${files.length} photos… this can take a minute.`;
  const fd = new FormData();
  fd.append('keep', document.getElementById('keep').value);
  files.forEach(f => fd.append('files', f));
  const res = await fetch('/api/analyze', { method:'POST', body:fd });
  if (res.ok) window.location = '/results';
  else { document.getElementById('status').textContent = 'Something went wrong — try again.'; go.disabled = false; }
};
</script>
</body>
</html>
